name: Auto Buyer Search v5

on:
  schedule:
    # 21:30 UTC = 3:00 AM IST daily. Tavily free tier = 1,000
    # searches/month; this workflow uses 12 per run, so once a
    # day (~360/month) is very safe.
    - cron: "30 21 * * *"
  workflow_dispatch: {}
    # ^ lets you click "Run workflow" in the Actions tab to trigger
    #   it manually any time, e.g. right after setting up secrets.

permissions:
  contents: write

jobs:
  search-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run automated buyer search
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/auto-buyer-search5.mjs

      - name: Commit and push updated database
        run: |
          git config user.name "buyer-finder-bot"
          git config user.email "actions@users.noreply.github.com"
          git add buyerdatabase5.json
          git diff --quiet --cached || git commit -m "Auto-update buyer database $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
