name: Send Emails

on:
  schedule:
    # 4:15 AM UTC = 9:45 AM IST daily -- runs a couple hours after
    # the buyer-search workflow (3:17 AM IST) so fresh leads from
    # that night's run are already in the database before emailing.
    - cron: "15 4 * * *"
  workflow_dispatch: {}
    # ^ still lets you trigger it by hand any time from the Actions tab.

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send emails
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/send-emails.mjs

      - name: Commit updated database
        run: |
          git config user.name "buyer-finder-bot"
          git config user.email "actions@users.noreply.github.com"
          git add buyerdatabase5.json
          git diff --quiet --cached || git commit -m "Updated email send status"
          git push
