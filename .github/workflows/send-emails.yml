name: Send Emails

on:
  schedule:
    # Runs 4 times a day (every 6 hours) to match your automated lead enrichment schedule
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send emails
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/send-emails.mjs

      - name: Commit updated database
        run: |
          git config user.name "buyer-finder-bot"
          git config user.email "actions@users.noreply.github.com"
          git add buyerdatabase5.json
          git diff --quiet --cached || git commit -m "Updated email send status"
          git push
