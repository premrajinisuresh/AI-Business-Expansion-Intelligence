name: Enrich Buyers V6

on:
  schedule:
    # Runs every 6 hours (4 times a day) to quickly process the backlog
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  

permissions:
  contents: write

jobs:
  enrich-buyers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run enrichment
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/enrich-buyers-v6.mjs

      - name: Commit updated database
        run: |
          git config user.name "buyer-finder-bot"
          git config user.email "actions@users.noreply.github.com"
          git add buyerdatabase5.json
          git diff --quiet --cached || git commit -m "Enriched buyer database"
          git push
