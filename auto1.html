<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto AI</title>

<link rel="stylesheet" href="css/style.css">

<script defer src="js/app.js"></script>
<script defer src="js/search.js"></script>
<script defer src="js/ai.js"></script>
<script defer src="js/database.js"></script>
<script defer src="js/intelligence.js"></script>

</head>

<body>

<header>

<h1>🤖 Auto AI Research</h1>

<p>Automatic Business Expansion Intelligence</p>

</header>

<div class="container">

<div class="card">

<h2>Automation Status</h2>

<p>Status :
<span id="status">Stopped</span></p>

<p>Companies Found :
<span id="found">0</span></p>

<p>Saved :
<span id="saved">0</span></p>

<button onclick="startAutoResearch()">

▶ Start Auto Research

</button>

</div>

  <div class="card">

<h2>🎯 AI Buyer Search</h2>

<label>Search Radius</label><br>

<select id="radius">
<option>25 KM</option>
<option>50 KM</option>
<option>100 KM</option>
<option>Tamil Nadu</option>
<option>India</option>
<option>Global</option>
</select>

<br><br>

<label>Buyer Category</label><br>

<select id="category">
<option>All Buyers</option>
<option>Petrol Companies</option>
<option>EV Charging</option>
<option>Hotels</option>
<option>Resorts</option>
<option>Restaurants</option>
<option>Commercial Builders</option>
<option>Retail Chains</option>
<option>Warehouses</option>
<option>Automobile Showrooms</option>
<option>Hospitals</option>
<option>Educational Institutions</option>
</select>

<br><br>

<button onclick="findBuyers()">
🔍 FIND BUYERS
</button>

                 </div>

<div class="card">

<h2>Industries</h2>

<label><input type="checkbox" checked> Hotels</label><br>

<label><input type="checkbox" checked> Builders</label><br>

<label><input type="checkbox" checked> Hospitals</label><br>

<label><input type="checkbox" checked> Restaurants</label><br>

<label><input type="checkbox" checked> Logistics</label><br>

<label><input type="checkbox" checked> Retail</label>

</div>

<div class="card">

<h2>Navigation</h2>

<div class="grid">

<button onclick="location.href='index.html'">Home</button>

<button onclick="location.href='dashboard.html'">Dashboard</button>

<button onclick="location.href='research.html'">Research</button>

<button onclick="location.href='prospects.html'">Prospects</button>

<button onclick="location.href='settings.html'">Settings</button>

</div>

</div>

</div>

</body>

</html>
