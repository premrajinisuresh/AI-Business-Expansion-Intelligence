<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prospect CRM</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/app.js"></script>
  <script defer src="js/search.js"></script>
<script defer src="js/ai.js"></script>
</head>
<body>
<header>
<h1>Prospect CRM</h1>
<p>AI Business Expansion Intelligence</p>
</header>

<div class="container">
<div class="card">
<h2>New Prospect</h2>
<input type="text" placeholder="Company Name">
<input type="text" placeholder="Decision Maker">
<input type="text" placeholder="Phone">
<input type="email" placeholder="Email">
<input type="text" placeholder="Website">
<select>
<option>Research</option>
<option>Contacted</option>
<option>Meeting Scheduled</option>
<option>Negotiation</option>
<option>Closed</option>
</select>
<textarea rows="6" placeholder="Notes"></textarea>
<button onclick="saveProspect()">Save Prospect</button>
</div>

<div class="card">
<h2>Priority</h2>
<button>★★★★★ High</button>
<button>★★★★ Medium</button>
<button>★★★ Low</button>
</div>


  <div class="card">
<h2>Saved Prospects</h2>
<div id="prospectList"></div>
  </div>
<div class="card">
<h2>Navigation</h2>
<button onclick="location.href='index.html'">Home</button>
<button onclick="location.href='research.html'">Research</button>
<button onclick="location.href='company.html'">Company</button>
<button onclick="location.href='dashboard.html'">Dashboard</button>
<button onclick="location.href='settings.html'">Settings</button>
</div>
</div>

  <script>
const prospects = JSON.parse(localStorage.getItem("prospects")) || [];

let html = "";

prospects.forEach(p => {
html += `
<div class="card">
<b>${p.company}</b><br>
Industry: ${p.industry}<br>
Location: ${p.location}<br>
Decision Maker: ${p.decisionMaker}<br>
Phone: ${p.phone}<br>
Status: ${p.status}<br>
Date: ${p.date}
</div>
`;
});

document.getElementById("prospectList").innerHTML = html;
  </script>
</body>
</html>
